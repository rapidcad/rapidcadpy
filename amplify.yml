version: 1
applications:
  - appRoot: docs
    frontend:
      phases:
        preBuild:
          commands:
            # Install dependencies (triggers "postinstall: fumadocs-mdx" to generate .source/)
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
